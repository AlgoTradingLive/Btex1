apply plugin: 'com.android.application'

android {
    namespace "com.btex.app"
    compileSdkVersion 34
    defaultConfig {
        applicationId "com.btex.app"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        debug {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.4.0'
}
